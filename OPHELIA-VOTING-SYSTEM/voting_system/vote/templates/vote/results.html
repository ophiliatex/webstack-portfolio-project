<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Election Results</title>
</head>
<body>
    <h1>Election Results</h1>
    <ul>
        {% for candidate, votes in results.items %}
            <li>{{ candidate.name }} ({{ candidate.party }}): {{ votes }} votes</li>
        {% endfor %}
    </ul>
</body>
</html>
